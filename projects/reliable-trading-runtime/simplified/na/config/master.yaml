# ===================================================================
# ES MASTER PRESETS — Cleaned for Pro/Elite Launch
# ===================================================================

instruments:
  ES:
    point_value: 50
    tick_size: 0.25
    round_lot: 1

risk_presets:

  # ==========================================================
  # 🏆 ELITE TIER — Maximum quality
  # Model: retrain_v6_fixed_v2_hyper_016
  # Backtest: $102k VAL PnL | $1,900 DD | 77% WR | 5.26 PF
  # Profile: Highest confidence trades, minimum noise
  # ==========================================================
  es_elite_v1:
    description: "ELITE — retrain_v6_fixed_v2_hyper_016 | balanced high-quality flow"
    session_tz: America/Denver
    phase2: true
    phase2_tag: retrain_v6_fixed_v2_hyper_016
    phase2_close_enabled: false
    close_model_path: artifacts/phase2/candidates/retrain_v6_fixed_v2_hyper_016_open30_liveprep_v1/close.joblib
    phase2_close_threshold: 0.90
    gate_vwap: false
    vwap_gate_mode: any
    gate_ema: false
    gate_tod: true
    gate_mode: prob_and_one
    allowed_grades: ["A", "B"]
    max_trades_per_session: 10
    p_buy: 0.50
    p_sell: 0.50
    p_setup: 0.27  # restored to backfill-matched value for signal quality
    p_long: 0.70
    p_short: 0.68
    min_hold_bars: 1
    # Execution-level grade gate (A+/B+/C taxonomy, see _grade()). Only A+ signals reach
    # the order executor — blocks B+/C dilution. The audited A+ subset is the profitable one.
    min_execute_grade: "A+"
    max_hold_bars: 24
    weekend_flatten: true
    risk:
      max_daily_loss: 400
      max_risk_per_trade_usd: 150
      cooldown_after_loss: 15
      loss_streak_limit: 2
    probability_thresholds:
      min_p_long: 0.70
      min_p_short: 0.68
      p_setup: 0.27

    exit_prob_confirm_bars: 5
    persist_prob_bars: 20
    # TUNED: shelf-like protection — clamp winner giveback sooner
    max_r_giveback: 0.9
    # TUNED: scale up to 2 contracts on high-conviction A+ signals (auto_contracts uses prob)
    max_position_contracts: 2
    auto_contracts: true
    max_trades_per_day: 10
    # Per-trade risk cap set for live consistency and drawdown control.
    # Other controls stay active: max_daily_loss, max_losses_per_day,
    # max_position_contracts, cooldown_after_loss, and streak limits.
    instrument_risk_overrides: {max_stop_points: 8}
    # These top-level values intentionally override the risk: block above
    # (top-level wins in the registry fallback-merge): resolved max_daily_loss=500.
    max_daily_loss: 500
    max_risk_per_trade_usd: 300
    # Live lockout controls (fail-closed recovery profile)
    max_slippage_points: 6.0
    open_slippage_cooldown_bars: 6
    loss_cascade_consecutive_threshold: 2
    loss_cascade_cooldown_bars: 3
    loss_cascade_side_lockout_bars: 6
    # Suppress weak long windows observed in loss clusters; retune before re-enabling.

    # TUNED: longer cooldown after loss — prevents revenge trading, forces patience
    cooldown_after_loss: 30
    loss_streak_limit: 2
    # FIX-2 (2026-03-09): Belt-and-suspenders — also enforce max_losses in preset so
    # it is active even without the --max_losses_per_day CLI flag.
    max_losses_per_day: 3
    phase2_use_manifest_thresholds: true
    # Parity hardening (2026-04-02):
    # Enable override bypass when position_state is KNOWN (not UNTRACKED)
    override_prob_min: 1.0
    override_hold_conf_min: 1.0
    phase2_force_open_on_gate_pass: true
    phase2_force_open_min_setup: 0.06
    phase2_force_open_min_entry_conf: 0.10
    phase2_force_open_live_only: false
    allow_countertrend_in_unresolved: true
    trend_bias_guard_enabled: false
    allow_countertrend_fade_in_trend: false
    # Keep full bracket protection for closer backfill/live behavior.
    # Runner mode below suppresses the attached fixed target while preserving the protective stop.
    protection_mode: stop_and_target
    publish_min_grade: "B+"
    pnl_overlay_enabled: true
    pnl_giveback_activate_r: 2.0
    pnl_giveback_close_r: 0.75
    pnl_stall_bars: 6
    pnl_stall_min_mfe_r: 0.35
    pnl_stall_close_below_r: -0.15
    pnl_severe_adverse_r: 0.90
    pnl_target_arm_min_hold_bars: 5
    pnl_target_arm_min_unrealized_r: 1.0
    pnl_runner_enabled: true
    pnl_runner_arm_r: 2.25
    pnl_runner_hard_exit_r: 2.50
    pnl_runner_giveback_r: 0.5
    pnl_runner_suppress_target: true
    pnl_runner_ignore_close_before_arm: true
    pnl_shelf_enabled: false
    pnl_shelf_arm_mode: step_only
    pnl_shelf_steps_usd: [100, 200, 400, 700, 1000]
    pnl_shelf_locks_usd: [25, 100, 250, 500, 750]
    pnl_shelf_min_hold_bars: 1
    pnl_shelf_exit_mode: hard_floor
    pnl_shelf_intrabar: true
    pnl_shelf_rearm_cooldown_sec: 0
    phase2_close_min_hold_bars: 2
    phase2_close_min_hold_sec: 60
    min_signal_bars: 3
    new_position_grace_sec: 60
    # FIX (2026-03-11): Scratch re-entry block.
    # After a trade lasting <= scratch_block_bars_max bars, block same-direction
    # re-entry for scratch_reentry_cooldown_bars bars (0 = disabled).
    # Prevents: 08:50 LONG scratch (+$12) -> immediate 09:00 LONG re-entry at higher price.
    scratch_block_bars_max: 1
    scratch_reentry_cooldown_bars: 3
    # FIX (2026-03-12): Simulated bar stop enforcement — cap stop fills at stop price
    # when using bar High/Low (prevents gap-to-open from overstating losses in sim).
    sim_bar_stop_enforcement: true
    # FIX (2026-03-12): Post-stop cooldown — block all entries for N bars after a stop.
    post_stop_cooldown_bars: 3
    # min_target_r_multiple removed (2026-03-12): was 1.5 — audit showed this blocked
    # high-probability entries. Risk is controlled by stop size + daily loss limit instead.
    # FIX (2026-03-11): VWAP fade override — allow high-conviction reversal entries
    # when price is significantly extended from VWAP (open spike fades).
    # vwap_fade_override_pts: minimum VWAP distance to trigger override (0 = disabled).
    # vwap_fade_prob_threshold: max LONG prob for SHORT override (min LONG prob for LONG override).
    # Example: SHORT at 6800 when VWAP=6793 (dist=7 >= 5) and prob=0.288 (<= 0.28) -> allowed.
    vwap_fade_override_pts: 4.5
    vwap_fade_prob_threshold: 0.50
    # FIX (2026-03-11): Session extreme proximity guard.
    # Block LONG within extreme_proximity_pts of session high unless prob exceeds
    # p_buy + extreme_proximity_prob_boost. Block SHORT within pts of session low similarly.
    # Prevents: 09:00 LONG at 6797.50 (3.25 pts from 6800.75 high) with only prob=0.737.
    extreme_proximity_pts: 6.0
    extreme_proximity_prob_boost: 0.05
    # CRITICAL FIX (2026-05-27): Extended trading window for modelrun62_fixA replication
    # Backtest achieved $113K over 305 days with all-day trading (00:00-23:59).
    # Previous 07:00-14:00 restriction limited signal density by ~3x.
    trade_window_start: "00:00"
    trade_window_end: "23:59"

    guardrails:
      price_age_max_sec: 360
      snapshot_age_max_sec: 450
      # FIX-5 (2026-03-09): 90s bar age threshold (2x 5-min bar interval + 5s grace = 605s
      # effective from compute_effective_bar_age_max_sec; 90s here is overridden by the
      # effective calc but kept conservative so CLI --bar_age_max_sec should NOT be
      # set to 1200 (too permissive). Remove --bar_age_max_sec 1200 from CLI flags.
      bar_age_max_sec: 90
      protection_timeout_sec: 5
      close_emit_timeout_sec: 3
      reconciliation_grace_bars: 2
      cancel_loop_max_updates: 5
      max_exit_pending_sec: 15
      protection_repair_enabled: true
      auto_flatten_enabled: true
    allow_replay_exec_to_nt: true
    replay_execution_intended: true
    replay_exec_pacing: as_fast_as_possible
    phase_state:
      phase_state_machine_enabled: true
      phase_backfill_lag_sec_threshold: 1500
      phase_currentness_lag_sec_threshold: 120
      phase_currentness_confirmations_required: 3
      readiness_bad_count_to_disarm: 2
      readiness_good_count_to_rearm: 2

